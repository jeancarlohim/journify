<head>

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="The 45-Day Sprint — Journify" />
  <meta name="twitter:description" content="5–10 booked qualified meetings in 45 days. For solo and small-team service businesses selling through calls." />

  <link rel="stylesheet" href="/styles/tokens.css" />
  <style>
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: var(--sans); }
    body { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    * { box-sizing: border-box; }

    /* sticky nav */
    .j-nav-sticky {
      position: sticky; top: 0; z-index: 50;
      background: var(--bg);
      transition: border-color 180ms var(--ease);
      border-bottom: 0.5px solid transparent;
    }
    .j-nav-sticky.is-scrolled { border-bottom-color: var(--border); }

    /* Mobile */
    @media (max-width: 768px) {
      .j-nav-links { display: none; }
      .j-nav { padding: 0 24px; height: 56px; }
      .j-h1 { font-size: 34px !important; letter-spacing: -0.025em; }
      .j-h2 { font-size: 26px !important; }
      .j-h3 { font-size: 19px !important; }
      .j-h4 { font-size: 18px !important; }
      .j-body { font-size: 15px !important; }
      section { padding: 64px 24px !important; }
    }
    @media (max-width: 768px) {
      .j-s5-grid {
        grid-template-columns: 1fr !important;
        gap: 40px !important;
      }
    }

    /* keep the hamburger hidden on desktop */
    .j-hamb { display: none; }
    @media (max-width: 768px) { .j-hamb { display: inline-flex; } }

    /* drawer overlay */
    .j-page-drawer {
      position: fixed; inset: 0; z-index: 60;
      pointer-events: none;
    }
    .j-page-drawer.is-open { pointer-events: auto; }
    .j-page-drawer .j-overlay {
      background: rgba(26,23,20,0.40);
      opacity: 0; transition: opacity 180ms var(--ease);
    }
    .j-page-drawer.is-open .j-overlay { opacity: 1; }
    .j-page-drawer .j-drawer {
      transform: translateX(100%); transition: transform 240ms var(--ease);
    }
    .j-page-drawer.is-open .j-drawer { transform: translateX(0); }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body class="j-surface">
  <div id="root"></div>
  <script type="text/babel" src="/components/Section.jsx"></script>
  <script type="text/babel" src="/components/Accordion.jsx"></script>
  <script type="text/babel" src="/components/StickyNav.jsx"></script>
  <script type="text/babel" src="/components/MobileDrawer.jsx"></script>
  <script type="text/babel" src="/components/Footer.jsx"></script>
  <script type="text/babel" src="/pages/TheSprintPage.jsx"></script>
  <script type="text/babel">
    function App() {
      const [drawerOpen, setDrawerOpen] = React.useState(false);

      return (
        <>
          <StickyNav onOpenDrawer={() => setDrawerOpen(true)} ctaHref="https://cal.com/jeancarlohim/apply-for-thesprint" brandHref="/" />
          <main>
            <div style={{ maxWidth: 1080, margin: '0 auto' }}>
              <TheSprintPage />
            </div>
          </main>
          <Footer />
          <MobileDrawer open={drawerOpen} onClose={() => setDrawerOpen(false)} ctaHref="https://cal.com/jeancarlohim/apply-for-thesprint" />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
